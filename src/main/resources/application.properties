spring.application.name=product-service
server.port=8081

spring.datasource.url=jdbc:postgresql://postgresql:5432/is_product
#spring.datasource.url=jdbc:postgresql://localhost:5432/is_product
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.liquibase.change-log=classpath:liquibase-changelog.xml
spring.liquibase.enabled=true

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://${KEYCLOAK_HOST:keycloak}:${KEYCLOAK_PORT:8181}/realms/cloud-realm

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

#spring.cloud.consul.host=localhost
#spring.cloud.consul.port=8500
#spring.cloud.consul.discovery.enabled=true
#spring.cloud.consul.discovery.register=true
#spring.cloud.consul.discovery.service-name=${spring.application.name}

#frontend-url=http://localhost:3000
frontend-url=http://frontend:80

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

nebius=${nebius}

